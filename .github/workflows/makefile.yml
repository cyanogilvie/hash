name: Build and Release

on: push

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install pandoc texlive-latex-base texlive-latex-recommended ninja-build
        pip3 install --user meson

    - name: Cache Tcl build
      id: cache-tcl
      uses: actions/cache@v4
      with:
        path: /opt/tcl9.0
        key: ${{ runner.os }}-tcl9.0

    - name: Build Tcl 9.0
      if: steps.cache-tcl.outputs.cache-hit != 'true'
      run: |
        mkdir -p /tmp/src/tcl
        cd /tmp/src/tcl
        sudo mkdir /opt/tcl9.0
        sudo chown -R $(id -u) /opt/tcl9.0
        wget https://core.tcl-lang.org/tcl/tarball/core-9-0-3/tcl.tar.gz -O - | tar xz --strip-components=1
        cd unix
        ./configure CFLAGS="-DPURIFY" --prefix=/opt/tcl9.0
        make -j 8
        make install

    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Build tcl-hash
      run: |
        autoconf
        ./configure --with-tcl=/opt/tcl9.0/lib --enable-testmode
        make

    - name: Run tests
      run: make test 2>&1 | tee /tmp/test_results.log

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: /tmp/test_results.log

    - name: Build tcl-hash (meson)
      run: |
        PKG_CONFIG_PATH=/opt/tcl9.0/lib/pkgconfig meson setup builddir -Dtestmode=true
        meson compile -C builddir

    - name: Run tests (meson)
      run: meson test -C builddir --print-errorlogs

    - name: Create distribution
      run: |
        make dist

    - name: Upload distribution artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-tarball
        path: /tmp/dist/hash*.tar.gz

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        draft: false
        prerelease: false
        files: |
          /tmp/dist/hash*.tar.gz
        generate_release_notes: true
